<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Points Table View</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="top-nav">
    <a class="brand" href="../index.html">CricView</a>
    <nav class="menu" id="topMenu"><a href="points-table.html">Points</a><a href="series.html">Series</a><a href="team.html">Teams</a></nav>
    <button class="icon-btn theme-toggle">🌓</button>
  </header>

  <main class="container">
    <section class="card">
      <h2>Points Table View</h2>
      <p class="muted">Sortable and responsive points table UI.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Team</th><th>Played</th><th>Won</th><th>Lost</th><th>NRR</th><th>Points</th></tr></thead>
          <tbody>
            <tr><td>India</td><td>6</td><td>5</td><td>1</td><td>+1.24</td><td>10</td></tr>
            <tr><td>Australia</td><td>6</td><td>4</td><td>2</td><td>+0.82</td><td>8</td></tr>
            <tr><td>England</td><td>6</td><td>3</td><td>3</td><td>+0.26</td><td>6</td></tr>
            <tr><td>Pakistan</td><td>6</td><td>3</td><td>3</td><td>-0.12</td><td>6</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../assets/js/app.js"></script>
</body>
</html>
